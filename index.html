// ── the actual Part IV entropy story: collapse → explosion → damped ──
function entropyTrace(t) {
  const pts = [];
  for (let i = 0; i <= 400; i++) {
    const x = i / 400;
    let y;
    if (x < 0.22) y = 0.72 - 0.55 * Math.pow(x / 0.22, 1.7); // collapse
    else if (x < 0.42) {
      const u = (x - 0.22) / 0.2;
      y = 0.17 + 0.72 * Math.pow(u, 2.2); // explosion
    } else {
      const u = (x - 0.42) / 0.58;
      y = 0.46 + 0.42 * Math.exp(-4.2 * u) * Math.cos(11 * u); // damped
    }
    y += Math.sin(i * 2.7) * 0.006;
    pts.push([x, Math.max(0.03, Math.min(0.95, y))]);
  }
  return pts.slice(0, Math.max(2, Math.floor(pts.length * t)));
}

function EntropyHero() {
  const [t, setT] = useState(0);
  const raf = useRef();
  useEffect(() => {
    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduced) { setT(1); return; }
    let start;
    const tick = (ts) => {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / 3800);
      setT(p);
      if (p < 1) raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, []);

  const W = 900, H = 300, PAD = 8;
  const pts = entropyTrace(t);
  const d = pts.map(([x, y], i) =>
    `${i === 0 ? "M" : "L"}${PAD + x * (W - PAD * 2)},${H - PAD - y * (H - PAD * 2)}`
  ).join(" ");
  const head = pts[pts.length - 1];

  const zones = [
    { x: 0.0, w: 0.22, label: "collapse", c: C.broke },
    { x: 0.22, w: 0.2, label: "explosion", c: C.warn },
    { x: 0.42, w: 0.58, label: "clip-cov · damped", c: C.held },
  ];

  return (
    <div style={{ position: "relative", width: "100%" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", display: "block" }} aria-label="Entropy trace: collapse, explosion, then damped oscillation under Clip-Cov">
        {[0.25, 0.5, 0.75].map((g) => (
          <line key={g} x1={PAD} x2={W - PAD} y1={H - PAD - g * (H - PAD * 2)} y2={H - PAD - g * (H - PAD * 2)}
            stroke={C.line} strokeWidth="1" strokeDasharray="2 6" />
        ))}
        {zones.map((z) => {
          const zx = PAD + z.x * (W - PAD * 2);
          const zw = z.w * (W - PAD * 2);
          const on = t > z.x + 0.02;
          return (
            <g key={z.label} opacity={on ? 1 : 0} style={{ transition: "opacity .5s" }}>
              <rect x={zx} y={PAD} width={zw} height={H - PAD * 2} fill={z.c} opacity="0.05" />
              <line x1={zx} x2={zx} y1={PAD} y2={H - PAD} stroke={z.c} strokeWidth="1" opacity="0.3" />
              <text x={zx + 8} y={PAD + 16} fill={z.c} fontSize="11"
                fontFamily="'IBM Plex Mono',monospace" letterSpacing="0.08em">{z.label}</text>
            </g>
          );
        })}
        <path d={d} fill="none" stroke={C.paper} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
        {head && (
          <g>
            <circle cx={PAD + head[0] * (W - PAD * 2)} cy={H - PAD - head[1] * (H - PAD * 2)} r="4" fill={C.paper} />
            <circle cx={PAD + head[0] * (W - PAD * 2)} cy={H - PAD - head[1] * (H - PAD * 2)} r="9"
              fill="none" stroke={C.paper} strokeWidth="1" opacity="0.35" />
          </g>
        )}
        <text x={PAD} y={H - PAD + 2} fill={C.gray} fontSize="10"
          fontFamily="'IBM Plex Mono',monospace" letterSpacing="0.1em">POLICY ENTROPY · TRAINING STEP →</text>
      </svg>
    </div>
  );
}

function Tree({ tree, accent }) {
  const [picked, setPicked] = useState(null);
  const node = picked ? tree.nodes[picked] : null;
  const v = node ? VERDICT[node.verdict] : null;

  return (
    <div>
      {/* the question */}
      <div style={{
        border: `1px solid ${C.line}`, borderLeft: `2px solid ${accent}`,
        background: C.ink2, padding: "18px 20px", marginBottom: 18,
      }}>
        <div style={{
          fontFamily: "'Space Grotesk',sans-serif", fontSize: 17, fontWeight: 500,
          color: C.paper, lineHeight: 1.45, marginBottom: 8,
        }}>{tree.q}</div>
        <div style={{
          fontFamily: "'IBM Plex Serif',serif", fontSize: 13, color: C.gray,
          lineHeight: 1.6, maxWidth: 620,
        }}>{tree.hint}</div>
      </div>

      {/* the branches */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(180px,1fr))", gap: 10 }}>
        {tree.opts.map((o) => {
          const on = picked === o.to;
          const oc = VERDICT[tree.nodes[o.to].verdict].c;
          return (
            <button
              key={o.to}
              onClick={() => setPicked(on ? null : o.to)}
              aria-pressed={on}
              style={{
                background: on ? `${oc}12` : C.ink,
                border: `1px solid ${on ? oc : C.line}`,
                padding: "16px 16px", cursor: "pointer", textAlign: "left",
                fontFamily: "inherit", transition: "all .18s",
              }}
              onMouseEnter={(e) => { if (!on) e.currentTarget.style.borderColor = `${oc}70`; }}
              onMouseLeave={(e) => { if (!on) e.currentTarget.style.borderColor = C.line; }}
            >
              <div style={{
                fontFamily: "'IBM Plex Mono',monospace", fontSize: 13,
                color: on ? oc : C.paper, marginBottom: 6, fontWeight: 500,
              }}>{o.label}</div>
              <div style={{
                fontFamily: "'IBM Plex Serif',serif", fontSize: 12,
                color: C.gray, lineHeight: 1.5,
              }}>{o.detail}</div>
            </button>
          );
        })}
      </div>

      {/* the verdict */}
      <div style={{
        maxHeight: node ? 1400 : 0, overflow: "hidden",
        transition: "max-height .4s ease",
      }}>
        {node && (
          <div style={{ marginTop: 18, border: `1px solid ${C.line}`, borderTop: `2px solid ${v.c}` }}>
            <div style={{ padding: "20px 22px" }}>
              <div style={{
                display: "inline-block", fontFamily: "'IBM Plex Mono',monospace",
                fontSize: 9, letterSpacing: "0.16em", color: C.ink, background: v.c,
                padding: "3px 8px", marginBottom: 14,
              }}>{v.label}</div>

              <div style={{
                fontFamily: "'Space Grotesk',sans-serif", fontSize: 19, fontWeight: 500,
                color: C.paper, marginBottom: 10, letterSpacing: "-0.01em",
              }}>{node.title}</div>

              <p style={{
                fontFamily: "'IBM Plex Serif',serif", fontSize: 15, color: C.gray,
                lineHeight: 1.65, margin: "0 0 18px", maxWidth: 640,
              }}>{node.body}</p>

              {/* gates, when the node has them */}
              {node.gates && (
                <div style={{ display: "grid", gap: 1, background: C.line, border: `1px solid ${C.line}`, marginBottom: 18 }}>
                  {node.gates.map(([g, desc, pass]) => (
                    <div key={g} style={{
                      background: C.ink2, padding: "12px 14px",
                      display: "flex", gap: 12, alignItems: "center",
                    }}>
                      <span style={{
                        fontFamily: "'IBM Plex Mono',monospace", fontSize: 11,
                        color: C.ink, background: pass ? C.held : C.broke,
                        padding: "2px 7px", flexShrink: 0, minWidth: 22, textAlign: "center",
                      }}>{g}</span>
                      <span style={{
                        fontFamily: "'IBM Plex Serif',serif", fontSize: 13, color: C.paper,
                      }}>{desc}</span>
                    </div>
                  ))}
                </div>
              )}

              {node.gate && <GateTable />}
              {node.exhibit && <FP8Exhibit />}

              {/* the rule */}
              <div style={{
                borderLeft: `2px solid ${v.c}`, paddingLeft: 14, margin: "18px 0",
              }}>
                <div style={{
                  fontFamily: "'IBM Plex Mono',monospace", fontSize: 9,
                  letterSpacing: "0.14em", color: v.c, marginBottom: 6,
                }}>THE RULE</div>
                <div style={{
                  fontFamily: "'IBM Plex Serif',serif", fontSize: 15, fontStyle: "italic",
                  color: C.paper, lineHeight: 1.55, maxWidth: 620,
                }}>{node.rule}</div>
              </div>

              {/* what to do */}
              <div style={{
                fontFamily: "'IBM Plex Mono',monospace", fontSize: 9,
                letterSpacing: "0.14em", color: C.gray, margin: "18px 0 10px",
              }}>DO THIS NEXT</div>
              <ul style={{ margin: 0, paddingLeft: 18 }}>
                {node.next.map((n) => (
                  <li key={n} style={{
                    fontFamily: "'IBM Plex Serif',serif", fontSize: 14,
                    color: C.gray, lineHeight: 1.6, marginBottom: 7,
                  }}>{n}</li>
                ))}
              </ul>
            </div>

            <div style={{
              borderTop: `1px solid ${C.line}`, padding: "11px 22px",
              display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12,
            }}>
              <span style={{
                fontFamily: "'IBM Plex Mono',monospace", fontSize: 11, color: v.c,
              }}>{node.ch}</span>
              <button onClick={() => setPicked(null)} style={{
                background: "none", border: "none", cursor: "pointer",
                fontFamily: "'IBM Plex Mono',monospace", fontSize: 11, color: C.gray,
              }}>reset ×</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const TREES = [
  { key: "rl",      tab: "Should I run RL?",   src: "Table M.1 · Appendix M", tree: TREE_RL,      accent: C.held },
  { key: "reward",  tab: "My reward is lying", src: "Ch 31–32 · Part III",    tree: TREE_REWARD,  accent: C.warn },
  { key: "rollout", tab: "Is this speedup free?", src: "Ch 136 · Part XIV",   tree: TREE_ROLLOUT, accent: C.broke },
];

function DecisionTrees() {
  const [tab, setTab] = useState("rl");
  const active = TREES.find((t) => t.key === tab);

  return (
    <section style={{ maxWidth: 1080, margin: "0 auto", padding: "72px 24px", borderTop: `1px solid ${C.line}` }}>
      <div style={{
        fontFamily: "'IBM Plex Mono',monospace", fontSize: 10, letterSpacing: "0.18em",
        color: C.gray, textTransform: "uppercase", marginBottom: 18,
      }}>The decision matrices · Appendix M</div>

      <h2 style={{
        fontFamily: "'Space Grotesk',sans-serif", fontSize: "clamp(26px,3.4vw,40px)",
        fontWeight: 500, letterSpacing: "-0.02em", color: C.paper, margin: "0 0 14px",
      }}>Three decisions the book makes for you.</h2>

      <p style={{
        fontFamily: "'IBM Plex Serif',serif", fontSize: 16, lineHeight: 1.65,
        color: C.gray, maxWidth: 620, margin: "0 0 36px",
      }}>
        Each one has a measurement at the root and a threshold at every branch. No taste,
        no vibes — every leaf traces to a chapter and a number that came out of a run.
      </p>

      {/* tabs */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 0, borderBottom: `1px solid ${C.line}`, marginBottom: 28 }}>
        {TREES.map((t) => {
          const on = tab === t.key;
          return (
            <button
              key={t.key}
              onClick={() => setTab(t.key)}
              aria-pressed={on}
              style={{
                background: "none", border: "none", cursor: "pointer",
                padding: "12px 18px 14px", textAlign: "left",
                borderBottom: `2px solid ${on ? t.accent : "transparent"}`,
                marginBottom: -1, fontFamily: "inherit",
              }}
            >
              <div style={{
                fontFamily: "'Space Grotesk',sans-serif", fontSize: 15,
                fontWeight: 500, color: on ? C.paper : C.gray, marginBottom: 3,
              }}>{t.tab}</div>
              <div style={{
                fontFamily: "'IBM Plex Mono',monospace", fontSize: 10,
                color: on ? t.accent : C.line,
              }}>{t.src}</div>
            </button>
          );
        })}
      </div>

      <Tree key={active.key} tree={active.tree} accent={active.accent} />
    </section>
  );
}
